<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>簡易自動比對工具</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #reader { border: none !important; position: relative; width: 100%; overflow: hidden; background: #000; }
        #reader * { border: none !important; } 
        #reader video { border-radius: 1.5rem; object-fit: cover; background: #0f172a; transition: filter 0.2s ease; }
        
        /* 徹底移除內建 UI 的視覺干擾 */
        #reader__scan_region > div { display: none !important; }
        #reader__dashboard, #reader__header, #reader__status_span, #reader__camera_selection { display: none !important; }
        #reader img { display: none !important; }

        .enhanced-vision video { filter: grayscale(1) contrast(1.8) brightness(1.1); }
        .match-glow { animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .scanner-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 60; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .corner-part { position: absolute; width: 30px; height: 30px; border: 4px solid white; pointer-events: none; box-sizing: border-box; z-index: 100; }
        .corner-tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 15px; }
        .corner-tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-top-right-radius: 15px; }
        .corner-bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-bottom-left-radius: 15px; }
        .corner-br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 15px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 overflow-x-hidden text-center">

    <!-- 頂部導航 -->
    <nav class="bg-slate-900 text-white p-5 shadow-2xl sticky top-0 z-50 border-b border-white/5">
        <div class="container mx-auto flex justify-between items-center px-2">
            <h1 class="text-xl font-black tracking-tighter italic flex items-center">
                <span class="text-blue-500 mr-2">●</span>List Check
            </h1>
            <div id="page-indicator" class="text-[9px] font-black uppercase tracking-[0.2em] opacity-60 font-mono text-right">Setup Mode</div>
        </div>
    </nav>

    <!-- 頁面一：設定模式 -->
    <div id="page-setup" class="p-4 max-w-md mx-auto space-y-6">
        <section class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-8">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">1. 備料清單輸入</h2>
                <span id="list-stat" class="text-[10px] text-slate-400 font-mono text-center">0 Items</span>
            </div>
            <textarea id="part-list" class="w-full h-48 p-6 bg-slate-50 border border-slate-100 rounded-[2rem] focus:ring-4 focus:ring-blue-500/10 focus:outline-none text-sm font-mono transition-all mb-6 shadow-inner" placeholder="請在此輸入料號，每行一個..."></textarea>
            <button onclick="goToWorkPage()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black active:scale-[0.97] transition-all shadow-xl shadow-slate-200 text-sm uppercase tracking-[0.2em]">進入工作頁</button>
        </section>
    </div>

    <!-- 頁面二：工作模式 -->
    <div id="page-work" class="hidden p-4 max-w-md mx-auto space-y-5 pb-10">
        
        <header class="flex items-center justify-between bg-white rounded-[2rem] p-4 shadow-sm border border-slate-200">
            <div class="flex flex-col ml-2 text-left">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 text-left w-full">上次比對結果</p>
                <div id="last-match-display" class="text-lg font-black text-blue-600 italic tracking-tighter underline decoration-blue-100 decoration-2 underline-offset-4">---</div>
            </div>
            <button onclick="toggleInventoryDetail()" class="bg-slate-900 text-white px-5 py-3 rounded-2xl font-black text-[10px] shadow-lg active:scale-90 transition-all uppercase tracking-widest text-center">清單進度</button>
        </header>

        <!-- 分析面板 (核對明細) -->
        <div id="inventory-detail-box" class="hidden bg-white rounded-[2rem] p-6 shadow-xl border border-blue-100 mx-auto text-center animate-in slide-in-from-top-4 duration-300">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-green-50 p-4 rounded-2xl border border-green-100 text-center">
                    <p class="text-[9px] text-green-600 font-black mb-1 uppercase tracking-widest text-center w-full">已完成</p>
                    <p id="matched-count" class="text-2xl font-black text-green-700 text-center w-full">0</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-slate-400 text-center">
                    <p class="text-[9px] font-black mb-1 uppercase tracking-widest text-center w-full text-slate-400">待處理</p>
                    <p id="unmatched-count" class="text-2xl font-black text-center w-full text-slate-400">0</p>
                </div>
            </div>
            <div class="space-y-6 max-h-[300px] overflow-y-auto pr-1 text-left">
                <div class="space-y-2">
                    <h4 class="text-[10px] font-black text-green-600 uppercase tracking-widest border-b border-green-100 pb-2 px-1 italic">✓ Checked List</h4>
                    <div id="matched-parts-list" class="flex flex-col space-y-1.5 font-mono text-xs text-left"></div>
                </div>
                <div class="space-y-2">
                    <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-widest border-b border-slate-100 pb-2 px-1 italic text-left">○ Pending List</h4>
                    <div id="unmatched-parts-list" class="flex flex-col space-y-1.5 font-mono text-xs text-left"></div>
                </div>
            </div>
        </div>

        <!-- 掃描核心：狙擊模式 -->
        <section class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-6 relative text-center">
            <div class="flex justify-between items-center mb-4 px-2">
                <div class="flex flex-col text-left flex-1 mr-2">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Sniper Scope</h2>
                    <label class="flex items-center mt-2 cursor-pointer select-none">
                        <input type="checkbox" id="boost-toggle" class="sr-only peer" onchange="toggleBoost()">
                        <div class="w-6 h-3 bg-slate-200 rounded-full peer peer-checked:bg-blue-500 after:content-[''] after:absolute after:bg-white after:rounded-full after:h-2 after:w-2 after:top-[30px] after:left-[9px] peer-checked:after:translate-x-3 transition-all"></div>
                        <span class="ml-2 text-[8px] font-black text-slate-400 uppercase tracking-widest text-left">影像強化</span>
                    </label>
                </div>
                <div class="flex space-x-1">
                    <button id="torch-btn" onclick="toggleTorch()" class="hidden bg-amber-50 text-amber-600 w-10 h-10 flex items-center justify-center rounded-xl border border-amber-100 shadow-sm text-sm">🔦</button>
                    <button id="cam-toggle-btn" onclick="toggleScanner()" class="bg-blue-600 text-white px-6 h-10 rounded-xl text-[10px] font-black shadow-lg shadow-blue-200 uppercase tracking-widest">啟動掃描</button>
                </div>
            </div>
            
            <div id="scanner-container" onclick="handleScannerClick()" class="relative overflow-hidden rounded-3xl shadow-inner bg-slate-900 aspect-square cursor-pointer group mx-auto">
                <div id="reader" class="w-full h-full"></div>
                <div id="screenshot-view" class="absolute inset-0 hidden z-10 transition-opacity duration-300"><img id="captured-img" class="w-full h-full object-cover" alt="Snapshot"></div>
                
                <div id="camera-overlay" class="scanner-overlay opacity-0 transition-all duration-200">
                    <div id="overlay-card" class="px-8 py-5 rounded-3xl shadow-2xl transform scale-50 transition-all duration-300 flex flex-col items-center backdrop-blur-md border border-white/20 text-center">
                        <span id="overlay-icon" class="text-5xl mb-2"></span>
                        <span id="overlay-msg" class="text-xl font-black tracking-tight text-white"></span>
                        <span id="overlay-sub" class="text-[10px] font-bold uppercase mt-2 opacity-90 tracking-[0.2em] text-white"></span>
                    </div>
                </div>

                <!-- 狙擊準星視覺層 -->
                <div id="guide-lines" class="absolute inset-0 pointer-events-none flex items-center justify-center z-20">
                    <div id="scan-frame" class="w-[85%] h-[35%] relative bg-white/5 rounded-xl border border-white/10 shadow-[0_0_40px_rgba(0,0,0,0.4)]">
                        <div class="corner-part corner-tl"></div><div class="corner-part corner-tr"></div><div class="corner-part corner-bl"></div><div class="corner-part corner-br"></div>
                        <div id="scan-line" class="absolute inset-x-0 top-1/2 -translate-y-1/2 h-0.5 bg-red-500/90 shadow-[0_0_12px_rgba(239,68,68,0.9)] hidden"></div>
                    </div>
                </div>

                <div id="standby-mask" class="absolute inset-0 bg-slate-900/40 flex flex-col items-center justify-center text-white z-40 transition-opacity duration-500 text-center">
                    <div class="w-16 h-16 rounded-full border-4 border-white/40 flex items-center justify-center mb-3 bg-slate-900/20 group-active:scale-95 transition-transform">
                        <span class="text-2xl">📸</span>
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-[0.3em] opacity-80 text-white text-center">點擊畫面開始狙擊</p>
                </div>
            </div>
        </section>

        <!-- 歷史清單：具備連續去重與展開功能 -->
        <section class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-6 text-center">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">歷史清單</h2>
                <button onclick="toggleFullHistory()" id="history-toggle-btn" class="text-[9px] font-black text-blue-500 bg-blue-50 px-3 py-1 rounded-full border border-blue-100 hover:bg-blue-600 hover:text-white transition-all">展開全部 ↓</button>
            </div>
            
            <div id="history-list-container" class="space-y-2 mb-6 min-h-[120px] transition-all duration-300 max-h-[220px] overflow-hidden">
                <div id="history-items-wrapper" class="space-y-2">
                    <p class="text-slate-300 italic text-center text-xs py-10 opacity-60 font-medium w-full text-center">等待巡檢數據...</p>
                </div>
            </div>

            <button onclick="finishWork()" class="w-full py-4 bg-red-50 text-red-600 text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl border border-red-100 active:scale-95 transition-all font-bold">重置任務 🏁</button>
        </section>
    </div>

    <!-- 任務完成彈窗 -->
    <div id="mission-complete-modal" class="hidden fixed inset-0 z-[200] bg-green-900/80 backdrop-blur-md flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl scale-95 animate-in zoom-in duration-300 text-center">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner shadow-green-200/30 text-center">🏆</div>
            <h4 class="font-black text-slate-800 mb-2 text-xl tracking-tighter w-full text-center">任務完滿達成</h4>
            <p class="text-xs text-slate-400 mb-10 leading-relaxed px-4 w-full text-center">清單內所有料號已全數核對完畢。</p>
            <button onclick="closeCompleteModal()" class="w-full py-4 bg-green-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">確定</button>
        </div>
    </div>

    <!-- 重置確認彈窗 -->
    <div id="reset-confirm-modal" class="hidden fixed inset-0 z-[200] bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl scale-95 animate-in zoom-in duration-200 text-center">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl text-center">⚠️</div>
            <h4 class="font-black text-slate-800 mb-2 uppercase tracking-tight w-full text-center">確定要重置？</h4>
            <p class="text-xs text-slate-400 mb-8 leading-relaxed w-full text-center">目前的掃描進度與歷史清單將會歸零。</p>
            <div class="space-y-3 w-full">
                <button onclick="confirmReset(true)" class="w-full py-4 bg-red-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg">確認重置</button>
                <button onclick="confirmReset(false)" class="w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-black text-xs uppercase tracking-widest">取消</button>
            </div>
        </div>
    </div>

    <script>
        let inventory = new Set();
        let historyArray = []; 
        let html5QrCode;
        let isScannerRunning = false;
        let isProcessing = false;
        let torchOn = false;
        let isHistoryExpanded = false;

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = "sine";
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) {}
        }

        function triggerVibrate() { if (navigator.vibrate) navigator.vibrate([150, 50, 100]); }

        function toggleBoost() {
            const container = document.getElementById('reader');
            document.getElementById('boost-toggle').checked ? container.classList.add('enhanced-vision') : container.classList.remove('enhanced-vision');
        }

        function goToWorkPage() {
            const text = document.getElementById('part-list').value.trim();
            const parts = text.split('\n').map(p => p.trim()).filter(p => p !== "");
            if (parts.length === 0) { showToast("請先輸入備料清單"); return; }
            inventory = new Set(parts);
            localStorage.setItem('part-inventory', text);
            document.getElementById('page-setup').classList.add('hidden');
            document.getElementById('page-work').classList.remove('hidden');
            document.getElementById('page-indicator').innerText = "Work Mode";
            updateInventoryStat();
        }

        function finishWork() { document.getElementById('reset-confirm-modal').classList.remove('hidden'); }

        function confirmReset(shouldReset) {
            document.getElementById('reset-confirm-modal').classList.add('hidden');
            if (!shouldReset) return;
            document.getElementById('page-work').classList.add('hidden');
            document.getElementById('page-setup').classList.remove('hidden');
            document.getElementById('page-indicator').innerText = "Setup Mode";
            if (isScannerRunning) stopScanner();
            historyArray = []; inventory.clear();
            document.getElementById('last-match-display').innerText = "---";
            document.getElementById('inventory-detail-box').classList.add('hidden');
            renderInventoryStatus(); renderHistory();
        }

        function updateInventoryStat() {
            document.getElementById('list-stat').innerText = `${inventory.size} Items`;
            renderInventoryStatus();
        }

        function handleScannerClick() { if (!isScannerRunning && !isProcessing) startScanner(); }

        // --- 核心優化：回歸最高相容性啟動模式，修復安卓與 PC 端的點火問題 ---
        async function startScanner() {
            if (isScannerRunning) return;
            const readerEl = document.getElementById('reader');
            if (readerEl) readerEl.innerHTML = "";
            isScannerRunning = true;
            document.getElementById('standby-mask').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('screenshot-view').classList.add('hidden'); 
            document.getElementById('scan-line').classList.remove('hidden');
            updateScannerUI();

            html5QrCode = new Html5Qrcode("reader");
            
            // 採用您之前測試成功的「極簡配置」
            const config = { 
                fps: 10, 
                qrbox: 250
            };
            
            try {
                // 回歸最穩定啟動指令：僅使用 facingMode，移除所有強制的解析度與比例約束
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    (text) => { if (!isProcessing) handleScan(text); }, 
                    () => {}
                );
                
                setTimeout(() => {
                    try {
                        const caps = html5QrCode.getRunningTrackCapabilities();
                        if (caps.torch) document.getElementById('torch-btn').classList.remove('hidden');
                    } catch(e) {}
                }, 300);
            } catch (err) { 
                // 若 environment 啟動失敗，則使用通用備案
                try {
                    await html5QrCode.start({}, config, (text) => { if (!isProcessing) handleScan(text); }, () => {});
                } catch(e) {
                    isScannerRunning = false; updateScannerUI(); showToast("鏡頭啟動失敗");
                    document.getElementById('standby-mask').classList.remove('opacity-0', 'pointer-events-none');
                }
            }
        }

        async function stopScanner() {
            if (html5QrCode) {
                try { await html5QrCode.stop(); } catch(e) {}
                document.getElementById('reader').innerHTML = ""; html5QrCode = null;
            }
            isScannerRunning = false;
            document.getElementById('standby-mask').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('scan-line').classList.add('hidden');
            document.getElementById('torch-btn').classList.add('hidden');
            updateScannerUI();
        }

        function toggleScanner() { isScannerRunning ? stopScanner() : startScanner(); }

        function updateScannerUI() {
            const btn = document.getElementById('cam-toggle-btn');
            if (isScannerRunning) {
                btn.innerText = "CANCEL";
                btn.className = "bg-slate-200 text-slate-500 px-5 h-10 rounded-xl text-[10px] font-black uppercase tracking-widest text-center";
            } else {
                btn.innerText = "啟動掃描";
                btn.className = "bg-blue-600 text-white px-6 h-10 rounded-xl text-[10px] font-black shadow-lg shadow-blue-200 uppercase tracking-widest text-center";
            }
        }

        async function toggleTorch() {
            if (!html5QrCode || !isScannerRunning) return;
            torchOn = !torchOn;
            try { await html5QrCode.applyVideoConstraints({ advanced: [{ torch: torchOn }] }); } catch(e) {}
        }

        function handleScan(code) {
            if (isProcessing) return;
            isProcessing = true;
            const isMatch = inventory.has(code);
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
            
            // 連續去重機制：A, A, B, A
            if (historyArray.length > 0 && historyArray[0].code === code) {
                historyArray[0].timeStr = timeStr;
                historyArray[0].isMatch = isMatch;
            } else {
                historyArray.unshift({ code, isMatch, timeStr });
            }
            
            triggerVibrate(); playBeep(); captureFrame();
            if (isMatch) document.getElementById('last-match-display').innerText = code;
            
            renderHistory();
            renderInventoryStatus();
            showOverlay(code, isMatch);

            setTimeout(async () => {
                await stopScanner();
                isProcessing = false; hideOverlay();
                
                // 檢查是否達成全數命中
                const matchedCount = [...inventory].filter(p => historyArray.some(h => h.code === p && h.isMatch)).length;
                if (isMatch && matchedCount === inventory.size) {
                    document.getElementById('mission-complete-modal').classList.remove('hidden');
                }
            }, 800);
        }

        function captureFrame() {
            const video = document.querySelector('#reader video');
            if (!video) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            document.getElementById('captured-img').src = canvas.toDataURL('image/webp', 0.9);
            document.getElementById('screenshot-view').classList.remove('hidden');
        }

        function showOverlay(code, isMatch) {
            const overlay = document.getElementById('camera-overlay');
            const card = document.getElementById('overlay-card');
            overlay.classList.remove('opacity-0'); card.classList.replace('scale-50', 'scale-100');
            const icon = document.getElementById('overlay-icon');
            const msg = document.getElementById('overlay-msg');
            const sub = document.getElementById('overlay-sub');
            if (isMatch) {
                card.className = "px-8 py-5 rounded-3xl shadow-2xl transform transition-all duration-300 flex flex-col items-center bg-green-500/90 text-white match-glow border border-white/20 text-center";
                icon.innerText = "🎯"; msg.innerText = "正確"; sub.innerText = `${code}`;
            } else {
                card.className = "px-8 py-5 rounded-3xl shadow-2xl transform transition-all duration-300 flex flex-col items-center bg-red-600/95 text-white border border-white/20 text-center";
                icon.innerText = "💨"; msg.innerText = "不在清單內"; sub.innerText = `料號: ${code}`;
            }
        }

        function hideOverlay() {
            document.getElementById('camera-overlay').classList.add('opacity-0');
            document.getElementById('overlay-card').classList.replace('scale-100', 'scale-50');
        }

        function renderHistory() {
            const wrapper = document.getElementById('history-items-wrapper');
            if (historyArray.length === 0) { wrapper.innerHTML = `<p class="text-slate-300 italic text-center text-xs py-10 opacity-60 font-medium w-full text-center">等待巡檢數據...</p>`; return; }
            wrapper.innerHTML = historyArray.map((item, index) => `
                <div class="flex justify-between items-center p-4 rounded-2xl border transition-all ${index === 0 ? 'bg-white border-blue-200 shadow-md scale-[1.02] z-10' : 'bg-slate-50 border-transparent opacity-60'}">
                    <div class="flex flex-col text-left">
                        <span class="font-mono text-sm font-black text-slate-800 tracking-tighter text-xs text-left">${item.code}</span>
                        <span class="text-[8px] font-black ${item.isMatch ? 'text-green-500' : 'text-red-400'} tracking-[0.1em] uppercase italic text-left">${item.isMatch ? 'Correct' : 'Mismatch'}</span>
                    </div>
                    <span class="text-[9px] text-slate-300 font-mono tracking-tighter text-right">${item.timeStr}</span>
                </div>
            `).join('');
        }

        function toggleFullHistory() {
            const container = document.getElementById('history-list-container');
            const btn = document.getElementById('history-toggle-btn');
            isHistoryExpanded = !isHistoryExpanded;
            if (isHistoryExpanded) {
                container.style.maxHeight = '1000px'; container.style.overflowY = 'auto'; btn.innerText = '收合歷史 ↑';
            } else {
                container.style.maxHeight = '220px'; container.style.overflowY = 'hidden'; btn.innerText = '展開全部 ↓'; container.scrollTop = 0;
            }
        }

        function toggleInventoryDetail() { 
            const box = document.getElementById('inventory-detail-box');
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) renderInventoryStatus();
        }

        function closeCompleteModal() { document.getElementById('mission-complete-modal').classList.add('hidden'); }

        function renderInventoryStatus() {
            const matchedParts = [...inventory].filter(code => historyArray.some(h => h.code === code && h.isMatch));
            const unmatchedParts = [...inventory].filter(code => !historyArray.some(h => h.code === code && h.isMatch));
            document.getElementById('matched-count').innerText = matchedParts.length;
            document.getElementById('unmatched-count').innerText = unmatchedParts.length;
            
            const mList = document.getElementById('matched-parts-list');
            const uList = document.getElementById('unmatched-parts-list');
            
            if (mList) mList.innerHTML = matchedParts.length > 0 
                ? matchedParts.map(p => `<div class="p-3 bg-green-50 border border-green-100 rounded-xl mb-1 flex justify-between items-center text-left text-left text-left"><span class="font-bold text-green-700 underline decoration-green-200 text-xs">${p}</span><span class="text-[8px] font-black text-green-400 italic text-right">OK</span></div>`).join('') 
                : '<div class="p-3 text-center text-[10px] text-slate-300 italic w-full">尚未命中目標</div>';
            
            if (uList) uList.innerHTML = unmatchedParts.length > 0 
                ? unmatchedParts.map(p => `<div class="p-3 bg-slate-50 border border-slate-100 rounded-xl mb-1 flex justify-between items-center text-left text-left text-left"><span class="text-slate-500 text-xs text-left">${p}</span><span class="text-[8px] font-black text-slate-300 italic text-right">WAIT</span></div>`).join('') 
                : '<div class="p-8 text-center bg-green-600 rounded-3xl shadow-xl shadow-green-100 animate-pulse text-center w-full"><p class="text-xs font-black text-white tracking-widest uppercase italic w-full text-center">MISSION COMPLETE</p></div>';
            
            return unmatchedParts.length;
        }

        function showToast(m) {
            const t = document.createElement('div');
            t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-4 rounded-2xl text-[10px] font-black z-[200] shadow-2xl animate-bounce border border-white/10 uppercase tracking-[0.2em] whitespace-nowrap text-center backdrop-blur-sm";
            t.innerText = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
        }

        window.onload = () => {
            const saved = localStorage.getItem('part-inventory');
            if (saved) { document.getElementById('part-list').value = saved; updateInventoryStat(); }
        };
    </script>
</body>
</html>
