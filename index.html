<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA 與移動端優化 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>料號快對 - 專業巡檢系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        /* 徹底清空掃描庫的所有內建 UI */
        #reader { border: none !important; position: relative; width: 100%; overflow: hidden; background: #000; }
        #reader * { border: none !important; } 
        #reader video { 
            border-radius: 1.5rem; 
            object-fit: cover; 
            background: #0f172a; 
            transition: filter 0.2s ease;
        }
        
        /* 移除內建干擾元素 */
        #reader__scan_region > div { display: none !important; }
        #reader__dashboard, #reader__header, #reader__status_span, #reader__camera_selection { display: none !important; }
        #reader img { display: none !important; }

        /* 視覺輔助：高對比單色模式 */
        .enhanced-vision video {
            filter: grayscale(1) contrast(1.8) brightness(1.1);
        }

        .match-glow { animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        
        .scanner-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 60;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .page-transition { transition: all 0.3s ease; }

        /* 剛性狙擊框：使用獨立 div 確保 iOS 不變形 */
        .corner-part {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid white;
            pointer-events: none;
            box-sizing: border-box;
            z-index: 100;
        }
        .corner-tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 15px; }
        .corner-tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-top-right-radius: 15px; }
        .corner-bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-bottom-left-radius: 15px; }
        .corner-br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 15px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 overflow-x-hidden text-center">

    <!-- 頂部導航 -->
    <nav class="bg-slate-900 text-white p-5 shadow-2xl sticky top-0 z-50 border-b border-white/5">
        <div class="container mx-auto flex justify-between items-center px-2">
            <h1 class="text-xl font-black tracking-tighter italic flex items-center">
                <span class="text-blue-500 mr-2">●</span>PART ANALYZER
            </h1>
            <div id="page-indicator" class="text-[9px] font-black uppercase tracking-[0.2em] opacity-60 font-mono text-right">
                Setup Mode
            </div>
        </div>
    </nav>

    <!-- 頁面一：設定模式 -->
    <div id="page-setup" class="page-transition p-4 max-w-md mx-auto space-y-6">
        <section class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-8 text-center">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">1. 備料清單輸入</h2>
                <span id="list-stat" class="text-[10px] text-slate-400 font-mono text-center">0 Items</span>
            </div>
            <textarea id="part-list" 
                      class="w-full h-48 p-6 bg-slate-50 border border-slate-100 rounded-[2rem] focus:ring-4 focus:ring-blue-500/10 focus:outline-none text-sm font-mono transition-all mb-6 shadow-inner"
                      placeholder="請在此輸入料號，每行一個..."></textarea>
            <button onclick="goToWorkPage()" class="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black active:scale-[0.97] transition-all shadow-xl shadow-slate-200 text-sm uppercase tracking-[0.2em] text-center">
                進入工作頁
            </button>
        </section>
    </div>

    <!-- 頁面二：工作模式 -->
    <div id="page-work" class="hidden page-transition p-4 max-w-md mx-auto space-y-5 pb-10">
        
        <header class="flex items-center justify-between bg-white rounded-[2rem] p-4 shadow-sm border border-slate-200">
            <div class="flex flex-col ml-2 text-left">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 text-left w-full">上次比對結果</p>
                <div id="last-match-display" class="text-lg font-black text-blue-600 italic tracking-tighter underline decoration-blue-100 decoration-2 underline-offset-4">
                    ---
                </div>
            </div>
            <button onclick="toggleInventoryDetail()" class="bg-slate-900 text-white px-5 py-3 rounded-2xl font-black text-[10px] shadow-lg active:scale-90 transition-all uppercase tracking-widest text-center">
                分析 📊
            </button>
        </header>

        <div id="inventory-detail-box" class="hidden bg-white rounded-[2rem] p-6 shadow-xl border border-blue-100 animate-in slide-in-from-top-4 duration-300 mx-auto text-center">
            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="bg-green-50 p-4 rounded-2xl border border-green-100">
                    <p class="text-[9px] text-green-600 font-black mb-1 uppercase tracking-widest text-center w-full">已完成</p>
                    <p id="matched-count" class="text-2xl font-black text-green-700 text-center w-full">0</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 text-slate-400 text-center">
                    <p class="text-[9px] font-black mb-1 uppercase tracking-widest text-center w-full">待處理</p>
                    <p id="unmatched-count" class="text-2xl font-black text-center w-full text-slate-400">0</p>
                </div>
            </div>
            <div class="space-y-6 max-h-[300px] overflow-y-auto pr-1 text-left">
                <div class="space-y-2">
                    <h4 class="text-[10px] font-black text-green-600 uppercase tracking-widest border-b border-green-100 pb-2 px-1 italic">✓ Checked List</h4>
                    <div id="matched-parts-list" class="flex flex-col space-y-1.5 font-mono text-xs"></div>
                </div>
                <div class="space-y-2">
                    <h4 class="text-[10px] font-black text-slate-300 uppercase tracking-widest border-b border-slate-100 pb-2 px-1 italic text-left">○ Pending List</h4>
                    <div id="unmatched-parts-list" class="flex flex-col space-y-1.5 font-mono text-xs text-left"></div>
                </div>
            </div>
        </div>

        <!-- 掃描核心區域 -->
        <section class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-6 relative">
            <div class="flex justify-between items-center mb-4 px-2 text-center">
                <div class="flex flex-col text-left flex-1 mr-2">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Live Match</h2>
                    <label class="flex items-center mt-2 cursor-pointer select-none">
                        <input type="checkbox" id="boost-toggle" class="sr-only peer" onchange="toggleBoost()">
                        <div class="w-6 h-3 bg-slate-200 rounded-full peer peer-checked:bg-blue-500 after:content-[''] after:absolute after:bg-white after:rounded-full after:h-2 after:w-2 after:top-[30px] after:left-[9px] peer-checked:after:translate-x-3 transition-all"></div>
                        <span class="ml-2 text-[8px] font-black text-slate-400 uppercase tracking-widest text-left">影像強化 (B&W)</span>
                    </label>
                </div>
                <div class="flex space-x-1">
                    <button id="torch-btn" onclick="toggleTorch()" class="hidden bg-amber-50 text-amber-600 w-10 h-10 flex items-center justify-center rounded-xl border border-amber-100 active:bg-amber-100 shadow-sm text-sm">🔦</button>
                    <button id="cam-toggle-btn" onclick="toggleScanner()" class="bg-blue-600 text-white px-6 h-10 rounded-xl text-[10px] font-black shadow-lg shadow-blue-200 active:bg-blue-700 uppercase tracking-widest transition-all text-center">啟動掃描</button>
                </div>
            </div>
            
            <div id="scanner-container" 
                 onclick="handleScannerClick()"
                 class="relative overflow-hidden rounded-3xl shadow-inner bg-slate-900 ring-4 ring-slate-100 transition-all duration-500 aspect-square cursor-pointer group mx-auto text-center">
                
                <div id="reader" class="w-full h-full text-center"></div>
                
                <!-- 捕捉定格層 -->
                <div id="screenshot-view" class="absolute inset-0 hidden z-10 transition-opacity duration-300">
                    <img id="captured-img" class="w-full h-full object-cover brightness-[1.1] contrast-[1.1]" alt="Snapshot">
                </div>
                
                <!-- 結果覆蓋層 -->
                <div id="camera-overlay" class="scanner-overlay opacity-0 transition-all duration-200">
                    <div id="overlay-card" class="px-8 py-5 rounded-3xl shadow-2xl transform scale-50 transition-all duration-300 flex flex-col items-center backdrop-blur-md border border-white/20 text-center">
                        <span id="overlay-icon" class="text-5xl mb-2 text-center"></span>
                        <span id="overlay-msg" class="text-xl font-black tracking-tight text-white text-center"></span>
                        <span id="overlay-sub" class="text-[10px] font-bold uppercase mt-2 opacity-90 tracking-[0.2em] text-white break-all text-center"></span>
                    </div>
                </div>

                <!-- 剛性狙擊準星 -->
                <div id="guide-lines" class="absolute inset-0 pointer-events-none flex items-center justify-center z-20 text-center">
                    <div id="scan-frame" class="w-[85%] h-[45%] relative bg-white/5 rounded-xl border border-white/10 shadow-[0_0_40px_rgba(0,0,0,0.4)]">
                        <div class="corner-part corner-tl"></div>
                        <div class="corner-part corner-tr"></div>
                        <div class="corner-part corner-bl"></div>
                        <div class="corner-part corner-br"></div>
                        <div id="scan-line" class="absolute inset-x-0 top-1/2 -translate-y-1/2 h-0.5 bg-red-500/90 shadow-[0_0_12px_rgba(239,68,68,0.9)] hidden text-center"></div>
                    </div>
                </div>
                
                <!-- 待機遮罩 -->
                <div id="standby-mask" class="absolute inset-0 bg-slate-900/40 flex flex-col items-center justify-center text-white z-40 transition-opacity duration-500 text-center">
                    <div class="w-16 h-16 rounded-full border-4 border-white/40 flex items-center justify-center mb-3 bg-slate-900/20 group-active:scale-95 transition-transform text-center">
                        <span class="text-2xl text-white">📸</span>
                    </div>
                    <p class="text-[10px] font-black uppercase tracking-[0.3em] opacity-80 text-center text-white">點擊畫面開始比對</p>
                </div>
            </div>
        </section>

        <!-- 最近紀錄與匯出 -->
        <section class="bg-white rounded-[2.5rem] shadow-sm border border-slate-200 p-6 text-center">
            <div class="flex justify-between items-center mb-4 px-2 text-center">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">最近比對 (不重複)</h2>
                <button onclick="exportToCSV()" class="text-[9px] font-black text-blue-500 bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100 tracking-widest uppercase hover:bg-blue-600 hover:text-white transition-all text-center">
                    輸出報告 📂
                </button>
            </div>
            <div id="unique-history-list" class="space-y-2 mb-6 min-h-[120px] text-center w-full">
                <p class="text-slate-300 italic text-center text-xs py-10 opacity-60 font-medium text-center w-full">等待比對數據...</p>
            </div>
            <div class="flex space-x-2 text-center">
                <button onclick="toggleLogDetail()" class="flex-1 py-4 bg-slate-100 text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl border border-slate-200 active:scale-95 transition-all text-center">
                    日誌 ↓
                </button>
                <button onclick="finishWork()" class="flex-1 py-4 bg-red-50 text-red-600 text-[10px] font-black uppercase tracking-[0.2em] rounded-2xl border border-red-100 active:scale-95 transition-all text-center font-bold text-center">
                    結束作業 🏁
                </button>
            </div>
        </section>
    </div>

    <!-- 彈窗組件 -->
    <div id="reset-confirm-modal" class="hidden fixed inset-0 z-[200] bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-6 text-center">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl scale-95 animate-in zoom-in duration-200 text-center">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl text-center">⚠️</div>
            <h4 class="font-black text-slate-800 mb-2 uppercase tracking-tight text-center w-full">重置任務？</h4>
            <p class="text-xs text-slate-400 mb-8 leading-relaxed text-center w-full">這將會結束目前進度並清空所有比對紀錄。</p>
            <div class="space-y-3 w-full text-center">
                <button onclick="confirmReset(true)" class="w-full py-4 bg-red-600 text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all text-center">確認重置</button>
                <button onclick="confirmReset(false)" class="w-full py-4 bg-slate-100 text-slate-400 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all text-center">取消</button>
            </div>
        </div>
    </div>

    <script>
        let inventory = new Set();
        let historyArray = []; 
        let html5QrCode;
        let isScannerRunning = false;
        let isProcessing = false;
        let torchOn = false;

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = "sine";
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) { console.warn("Audio feedback error", e); }
        }

        function triggerVibrate() {
            if (navigator.vibrate) navigator.vibrate([150, 50, 100]); 
        }

        function toggleBoost() {
            const container = document.getElementById('reader');
            if (document.getElementById('boost-toggle').checked) {
                container.classList.add('enhanced-vision');
            } else {
                container.classList.remove('enhanced-vision');
            }
        }

        function exportToCSV() {
            if (historyArray.length === 0) { showToast("無紀錄可供輸出"); return; }
            let csvContent = "\uFEFF"; 
            csvContent += "時間,料號,狀態\n";
            historyArray.forEach(item => {
                const status = item.isMatch ? "正確" : "不在清單內";
                csvContent += `${item.timeStr},"${item.code}",${status}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            const now = new Date();
            const timestamp = now.getFullYear() + (now.getMonth()+1).toString().padStart(2,'0') + now.getDate().toString().padStart(2,'0');
            link.setAttribute("href", url);
            link.setAttribute("download", `Inspection_Report_${timestamp}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("報告已匯出");
        }

        function goToWorkPage() {
            const text = document.getElementById('part-list').value.trim();
            const parts = text.split('\n').map(p => p.trim()).filter(p => p !== "");
            if (parts.length === 0) { showToast("請先輸入料號"); return; }
            inventory = new Set(parts);
            localStorage.setItem('part-inventory', text);
            document.getElementById('page-setup').classList.add('hidden');
            document.getElementById('page-work').classList.remove('hidden');
            document.getElementById('page-indicator').innerText = "Work Mode";
            updateInventoryStat();
            showToast("任務啟動");
        }

        function finishWork() { document.getElementById('reset-confirm-modal').classList.remove('hidden'); }

        function confirmReset(shouldReset) {
            document.getElementById('reset-confirm-modal').classList.add('hidden');
            if (!shouldReset) return;
            document.getElementById('page-work').classList.add('hidden');
            document.getElementById('page-setup').classList.remove('hidden');
            document.getElementById('page-indicator').innerText = "Setup Mode";
            if (isScannerRunning) {
                isScannerRunning = false;
                if (html5QrCode) {
                    html5QrCode.stop().catch(() => {}).finally(() => {
                        const el = document.getElementById('reader');
                        if (el) el.innerHTML = "";
                        html5QrCode = null;
                    });
                }
            }
            historyArray = [];
            inventory.clear();
            localStorage.removeItem('part-inventory');
            renderInventoryStatus();
            renderHistory();
        }

        function updateInventoryStat() {
            const listStat = document.getElementById('list-stat');
            if (listStat) listStat.innerText = `${inventory.size} Items`;
            renderInventoryStatus();
        }

        function handleScannerClick() {
            if (!isScannerRunning && !isProcessing) startScanner();
        }

        async function startScanner() {
            if (isScannerRunning) return;
            
            // 預防性清理：確保 DOM 完全乾淨
            const readerEl = document.getElementById('reader');
            if (readerEl) readerEl.innerHTML = "";
            
            isScannerRunning = true;
            document.getElementById('standby-mask').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('screenshot-view').classList.add('hidden'); 
            document.getElementById('scan-line').classList.remove('hidden');
            updateScannerUI();

            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 25, 
                qrbox: (w, h) => {
                    const side = Math.min(w, h);
                    // 核心調校：維持 80% 高度採樣區，改善對於正常大小條碼的抓地力
                    return { width: side * 0.9, height: side * 0.8 }; 
                },
                aspectRatio: 1.0,
                experimentalFeatures: { useBarCodeDetectorIfSupported: true },
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.ITF,
                    Html5QrcodeSupportedFormats.QR_CODE
                ]
            };

            const tryStart = async (constraints) => {
                try {
                    await html5QrCode.start(constraints, config, (text) => { if (!isProcessing) handleScan(text); }, () => {});
                    return true;
                } catch (e) { 
                    console.warn("Start attempt failed:", e.name, e.message);
                    return false; 
                }
            };

            // 層級點火協議 (Layered Ignition)
            // 嘗試路徑：後置環境鏡頭 -> 任何可用的環境鏡頭 -> 終極降壓啟動 (無參數)
            let success = false;
            
            // 嘗試 1：移動端標準後置鏡頭
            success = await tryStart({ facingMode: "environment" });

            // 嘗試 2：若失敗，嘗試帶變焦的進階參數 (僅在部分支援設備上生效)
            if (!success) {
                success = await tryStart({ facingMode: { ideal: "environment" } });
            }

            // 嘗試 3：電腦端/全通用模式，徹底解除硬體約束
            if (!success) {
                success = await tryStart({}); // 讓瀏覽器根據當前環境自選最穩定的鏡頭
            }

            if (success) {
                setTimeout(() => {
                    try {
                        const caps = html5QrCode.getRunningTrackCapabilities();
                        const torchBtn = document.getElementById('torch-btn');
                        if (torchBtn) torchBtn.classList.toggle('hidden', !caps.torch);
                    } catch(e) {}
                }, 300);
            } else {
                isScannerRunning = false;
                updateScannerUI();
                showToast("快門失敗：請確認鏡頭權限");
                document.getElementById('standby-mask').classList.remove('opacity-0', 'pointer-events-none');
            }
        }

        async function stopScanner() {
            if (html5QrCode) {
                try { 
                    await html5QrCode.stop(); 
                } catch(e) {
                } finally {
                    const reader = document.getElementById('reader');
                    if (reader) reader.innerHTML = "";
                    html5QrCode = null;
                }
            }
            isScannerRunning = false;
            document.getElementById('standby-mask').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('scan-line').classList.add('hidden');
            document.getElementById('torch-btn').classList.add('hidden');
            updateScannerUI();
        }

        function toggleScanner() { isScannerRunning ? stopScanner() : startScanner(); }

        function updateScannerUI() {
            const btn = document.getElementById('cam-toggle-btn');
            if (!btn) return;
            if (isScannerRunning) {
                btn.innerText = "CANCEL";
                btn.className = "bg-slate-200 text-slate-500 px-5 h-10 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-center";
            } else {
                btn.innerText = "啟動掃描";
                btn.className = "bg-blue-600 text-white px-6 h-10 rounded-xl text-[10px] font-black shadow-lg shadow-blue-200 active:bg-blue-700 uppercase tracking-widest transition-all text-center";
            }
        }

        async function toggleTorch() {
            if (!html5QrCode || !isScannerRunning) return;
            torchOn = !torchOn;
            try { await html5QrCode.applyVideoConstraints({ advanced: [{ torch: torchOn }] }); } catch(e) {}
        }

        // --- 紀錄優先協議，確保數據確實簽到 ---
        function handleScan(code) {
            if (isProcessing) return;
            isProcessing = true;
            
            // 1. 數據簽到 (存檔優先)
            const isMatch = inventory.has(code);
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
            
            // 更新本地快照
            historyArray = historyArray.filter(h => h.code !== code);
            historyArray.unshift({ code, isMatch, timeStr });
            
            // 2. 觸發回饋
            triggerVibrate();
            playBeep();
            captureFrame(); 
            
            if (isMatch) document.getElementById('last-match-display').innerText = code;
            
            renderHistory();
            const remaining = renderInventoryStatus();
            showOverlay(code, isMatch, false);

            // 3. 延遲熄火：確保渲染完成，解決 iOS 遺失紀錄的問題
            setTimeout(async () => {
                await stopScanner();
                isProcessing = false; 
                hideOverlay(); 
                
                if (isMatch && remaining === 0) {
                    document.getElementById('mission-complete-modal').classList.remove('hidden');
                }
            }, 1000);
        }

        function captureFrame() {
            const video = document.querySelector('#reader video');
            if (!video) return;
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const img = document.getElementById('captured-img');
            img.src = canvas.toDataURL('image/webp', 0.9); 
            document.getElementById('screenshot-view').classList.remove('hidden');
        }

        function showOverlay(code, isMatch, isDuplicate) {
            const overlay = document.getElementById('camera-overlay');
            const card = document.getElementById('overlay-card');
            if (!overlay || !card) return;
            overlay.classList.remove('opacity-0');
            card.classList.remove('scale-50');
            card.classList.add('scale-100');
            const icon = document.getElementById('overlay-icon');
            const msg = document.getElementById('overlay-msg');
            const sub = document.getElementById('overlay-sub');
            if (isMatch) {
                card.className = "px-8 py-5 rounded-3xl shadow-2xl transform transition-all duration-300 flex flex-col items-center bg-green-500/90 text-white match-glow border border-white/20 text-center";
                icon.innerText = "🎯";
                msg.innerText = "正確";
                sub.innerText = `${code}`;
            } else {
                card.className = "px-8 py-5 rounded-3xl shadow-2xl transform transition-all duration-300 flex flex-col items-center bg-red-600/95 text-white border border-white/20 text-center";
                icon.innerText = "💨";
                msg.innerText = "不在清單內";
                sub.innerText = `料號: ${code}`;
            }
        }

        function hideOverlay() {
            const overlay = document.getElementById('camera-overlay');
            const card = document.getElementById('overlay-card');
            if (overlay) overlay.classList.add('opacity-0');
            if (card) card.classList.replace('scale-100', 'scale-50');
        }

        function renderHistory() {
            const uniqueList = document.getElementById('unique-history-list');
            if (!uniqueList) return;
            
            if (historyArray.length === 0) {
                uniqueList.innerHTML = `<p class="text-slate-300 italic text-center text-xs py-10 opacity-60 font-medium text-center w-full">等待比對數據...</p>`;
                return;
            }
            
            const recentThree = historyArray.slice(0, 3);
            uniqueList.innerHTML = recentThree.map((item, index) => `
                <div class="flex justify-between items-center p-4 rounded-2xl border transition-all ${index === 0 ? 'bg-white border-blue-200 shadow-md scale-[1.02] z-10' : 'bg-slate-50 border-transparent opacity-60'}">
                    <div class="flex flex-col text-left">
                        <span class="font-mono text-sm font-black text-slate-800 tracking-tighter text-left text-xs">${item.code}</span>
                        <span class="text-[8px] font-black ${item.isMatch ? 'text-green-500' : 'text-red-400'} tracking-[0.1em] uppercase italic text-left">
                            ${item.isMatch ? 'Correct' : 'Mismatch'}
                        </span>
                    </div>
                    <span class="text-[9px] text-slate-300 font-mono tracking-tighter text-right">${item.timeStr}</span>
                </div>
            `).join('');
        }

        function toggleInventoryDetail() {
            const box = document.getElementById('inventory-detail-box');
            if (box) { box.classList.toggle('hidden'); if (!box.classList.contains('hidden')) renderInventoryStatus(); }
        }

        function toggleLogDetail() { const modal = document.getElementById('full-log-modal'); if (modal) modal.classList.toggle('hidden'); }

        function closeCompleteModal() { document.getElementById('mission-complete-modal').classList.add('hidden'); }

        function renderInventoryStatus() {
            const matchedParts = [...inventory].filter(code => historyArray.some(h => h.code === code && h.isMatch));
            const unmatchedParts = [...inventory].filter(code => !historyArray.some(h => h.code === code && h.isMatch));
            const mc = document.getElementById('matched-count');
            const uc = document.getElementById('unmatched-count');
            if (mc) mc.innerText = matchedParts.length;
            if (uc) uc.innerText = unmatchedParts.length;
            const mList = document.getElementById('matched-parts-list');
            const uList = document.getElementById('unmatched-parts-list');
            if (!mList || !uList) return unmatchedParts.length;
            
            mList.innerHTML = matchedParts.length > 0 
                ? matchedParts.map(p => `<div class="p-3 bg-green-50 border border-green-100 rounded-xl mb-1 flex justify-between items-center text-left"><span class="font-bold text-green-700 underline decoration-green-200 text-xs">${p}</span><span class="text-[8px] font-black text-green-400 italic text-right">OK</span></div>`).join('')
                : '<div class="p-3 text-center text-[10px] text-slate-300 italic w-full">尚未命中目標</div>';
            
            uList.innerHTML = unmatchedParts.length > 0
                ? unmatchedParts.map(p => `<div class="p-3 bg-slate-50 border border-slate-100 rounded-xl mb-1 flex justify-between items-center text-left text-left"><span class="text-slate-500 text-xs">${p}</span><span class="text-[8px] font-black text-slate-300 italic text-right">WAIT</span></div>`).join('')
                : '<div class="p-8 text-center bg-green-600 rounded-3xl shadow-xl shadow-green-100 animate-pulse text-center w-full"><p class="text-xs font-black text-white tracking-widest uppercase italic w-full text-center">MISSION COMPLETE</p></div>';
            
            return unmatchedParts.length;
        }

        function showToast(m) {
            const t = document.createElement('div');
            t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-4 rounded-2xl text-[10px] font-black z-[200] shadow-2xl animate-bounce border border-white/10 uppercase tracking-[0.2em] whitespace-nowrap text-center backdrop-blur-sm";
            t.innerText = m; document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        window.onload = () => {
            const saved = localStorage.getItem('part-inventory');
            if (saved) { const pl = document.getElementById('part-list'); if (pl) pl.value = saved; updateInventoryStat(); }
        };
    </script>
</body>
</html>
